<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI緣來分享</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1a1f1c;
      --paper: #e8efe6;
      --accent: #2d6a4f;
      --glow: #95d5b2;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "DM Sans", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(149, 213, 178, 0.45), transparent 55%),
        radial-gradient(ellipse 70% 50% at 90% 80%, rgba(45, 106, 79, 0.18), transparent 50%),
        linear-gradient(160deg, #f4faf6 0%, var(--paper) 45%, #d8e8dc 100%);
      overflow: hidden;
    }

    main {
      text-align: center;
      padding: 2rem;
      animation: rise 0.9s ease-out both;
    }

    h1 {
      font-family: "Instrument Serif", "Noto Serif TC", Georgia, serif;
      font-size: clamp(2.2rem, 9vw, 4.8rem);
      font-weight: 400;
      letter-spacing: 0.06em;
      line-height: 1.25;
      color: var(--accent);
    }

    h1 span {
      display: inline-block;
      animation: wave 2.4s ease-in-out infinite;
    }

    h1 span:nth-child(n) { animation-delay: calc(0.08s * var(--i, 0)); }

    p {
      margin-top: 1.25rem;
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: color-mix(in srgb, var(--ink) 65%, transparent);
      animation: fade 1.2s ease-out 0.35s both;
    }

    .link-line {
      margin-top: 1rem;
      animation: fade 1.2s ease-out 0.55s both;
    }

    .link-line a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 0.2em;
      font-weight: 500;
    }

    .link-line a:hover {
      color: var(--ink);
    }

    .orb {
      position: fixed;
      width: 28vmax;
      height: 28vmax;
      border-radius: 50%;
      background: radial-gradient(circle, var(--glow), transparent 70%);
      opacity: 0.35;
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
      z-index: -1;
    }

    .orb-a { top: -8%; left: -6%; }
    .orb-b {
      bottom: -12%;
      right: -8%;
      animation-delay: -4s;
      opacity: 0.25;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(1.5rem); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes wave {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-0.12em); }
    }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(4%, 6%) scale(1.08); }
    }
  </style>
</head>
<body>
  <div class="orb orb-a" aria-hidden="true"></div>
  <div class="orb orb-b" aria-hidden="true"></div>
  <main>
    <h1 aria-label="AI緣來分享">
      <span style="--i:0">A</span><span style="--i:1">I</span><span style="--i:2">緣</span><span style="--i:3">來</span><span style="--i:4">分</span><span style="--i:5">享</span>
    </h1>
    <p>１１５０７１１完成使用 Cursor 製作的第一個網頁</p>
    <p class="link-line">
      <a href="https://www.youtube.com/watch?v=3RAsnOmrW-c" target="_blank" rel="noopener noreferrer">學習參考影片連結</a>
    </p>
    <br /><br />
    <p class="link-line">
      <a href="directory/">其他學習日誌</a>
    </p>
  </main>
</body>
</html>
