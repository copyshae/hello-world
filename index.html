<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI緣來分享</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://images.unsplash.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #142018;
      --muted: #2d4036;
      --accent: #0f5c3d;
      --cream: #f4faf6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "DM Sans", sans-serif;
      color: var(--ink);
      overflow-x: hidden;
      background: #1a3a2a;
    }

    .scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .scene-photo {
      position: absolute;
      inset: -4%;
      background:
        url("https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1920&q=80")
        center / cover no-repeat;
      animation: kenburns 28s ease-in-out infinite alternate;
      transform-origin: 55% 40%;
    }

    .scene-veil {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          180deg,
          rgba(244, 250, 246, 0.55) 0%,
          rgba(232, 242, 234, 0.42) 38%,
          rgba(20, 50, 36, 0.28) 100%
        ),
        radial-gradient(
          ellipse 70% 55% at 50% 42%,
          rgba(255, 255, 255, 0.28),
          transparent 70%
        );
    }

    .scene-mist {
      position: absolute;
      inset: auto 0 0 0;
      height: 42%;
      background: linear-gradient(to top, rgba(210, 228, 216, 0.55), transparent);
      pointer-events: none;
      animation: mist 12s ease-in-out infinite alternate;
    }

    .frame {
      position: relative;
      z-index: 1;
      width: min(92vw, 38rem);
      padding: clamp(2rem, 5vw, 3.25rem) clamp(1.4rem, 4vw, 2.5rem);
      text-align: center;
      animation: rise 0.95s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .brand-mark {
      display: inline-block;
      margin-bottom: 1.35rem;
      padding-bottom: 0.35rem;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent);
      border-bottom: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
      animation: fade 1s ease-out 0.2s both;
    }

    h1 {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(2.6rem, 10vw, 5rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      line-height: 1.2;
      color: var(--accent);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.45);
    }

    h1 span {
      display: inline-block;
      animation: wave 2.6s ease-in-out infinite;
    }

    h1 span:nth-child(n) {
      animation-delay: calc(0.09s * var(--i, 0));
    }

    .lead {
      margin: 1.35rem auto 0;
      max-width: 26rem;
      font-size: clamp(0.98rem, 2.4vw, 1.1rem);
      font-weight: 500;
      letter-spacing: 0.03em;
      line-height: 1.7;
      color: var(--muted);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.35);
      animation: fade 1.1s ease-out 0.35s both;
    }

    .actions {
      margin-top: 2.4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      animation: fade 1.1s ease-out 0.55s both;
    }

    .actions a {
      display: inline-block;
      min-width: min(100%, 16rem);
      padding: 0.85rem 1.35rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-decoration: none;
      backdrop-filter: blur(6px);
      transition: transform 0.22s ease, background 0.22s ease, color 0.22s ease, border-color 0.22s ease;
    }

    .actions a.primary {
      color: var(--cream);
      background: color-mix(in srgb, var(--accent) 92%, black);
      border: 1px solid color-mix(in srgb, var(--accent) 92%, black);
    }

    .actions a.primary:hover {
      transform: translateY(-2px);
      background: #0a4730;
      border-color: #0a4730;
    }

    .actions a.secondary {
      color: var(--accent);
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent);
    }

    .actions a.secondary:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.78);
      border-color: var(--accent);
    }

    .footnote {
      margin-top: 2.5rem;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      color: color-mix(in srgb, var(--muted) 80%, transparent);
      animation: fade 1.1s ease-out 0.75s both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(1.6rem); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes wave {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-0.1em); }
    }

    @keyframes kenburns {
      from { transform: scale(1) translate(0, 0); }
      to { transform: scale(1.08) translate(-1.5%, 1%); }
    }

    @keyframes mist {
      from { opacity: 0.7; }
      to { opacity: 1; }
    }

    @media (max-width: 480px) {
      .actions a {
        min-width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .scene-photo,
      h1 span,
      .scene-mist {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="scene" aria-hidden="true">
    <div class="scene-photo"></div>
    <div class="scene-veil"></div>
    <div class="scene-mist"></div>
  </div>
  <main class="frame">
    <p class="brand-mark">Share &amp; Learn</p>
    <h1 aria-label="AI緣來分享">
      <span style="--i:0">A</span><span style="--i:1">I</span><span style="--i:2">緣</span><span style="--i:3">來</span><span style="--i:4">分</span><span style="--i:5">享</span>
    </h1>
    <p class="lead">１１５０７１１完成使用 Cursor 製作的第一個網頁</p>
    <div class="actions">
      <a class="primary" href="https://www.youtube.com/watch?v=3RAsnOmrW-c" target="_blank" rel="noopener noreferrer">學習參考影片連結</a>
      <a class="secondary" href="directory/">其他學習日誌</a>
    </div>
    <p class="footnote">AI × 學習分享</p>
  </main>
</body>
</html>
