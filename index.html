<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI緣來分享</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://images.unsplash.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1c2a22;
      --muted: #516357;
      --accent: #246049;
      --paper: #eef5ef;
      --line: rgba(36, 96, 73, 0.28);
      --light: #f7fbf8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "DM Sans", sans-serif;
      color: var(--ink);
      background: #d9e8de;
      overflow-x: hidden;
    }

    /* Full-bleed learning atmosphere */
    .backdrop {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .backdrop-photo {
      position: absolute;
      inset: 0;
      background:
        url("https://images.unsplash.com/photo-1456513080080-7e9d11d0a24d?auto=format&fit=crop&w=1800&q=80")
        center / cover no-repeat;
      opacity: 0.28;
      filter: grayscale(0.15) saturate(0.85) brightness(1.05);
      animation: soft-pan 30s ease-in-out infinite alternate;
      transform-origin: center;
    }

    .backdrop-wash {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          165deg,
          rgba(247, 251, 248, 0.86) 0%,
          rgba(232, 242, 234, 0.78) 48%,
          rgba(210, 228, 216, 0.84) 100%
        ),
        repeating-linear-gradient(
          transparent,
          transparent 31px,
          rgba(36, 96, 73, 0.035) 31px,
          rgba(36, 96, 73, 0.035) 32px
        );
    }

    .backdrop-edge {
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 0 1px rgba(36, 96, 73, 0.08);
      pointer-events: none;
    }

    main {
      position: relative;
      z-index: 1;
      width: min(92vw, 34rem);
      text-align: center;
      padding: clamp(1.75rem, 4vw, 2.75rem) 1.25rem;
      animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .course-label {
      display: inline-block;
      margin-bottom: 1.1rem;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      color: var(--accent);
      animation: fade 1s ease-out 0.15s both;
    }

    .course-label::after {
      content: "";
      display: block;
      width: 2.4rem;
      height: 1px;
      margin: 0.55rem auto 0;
      background: var(--accent);
      transform-origin: center;
      animation: draw 1.1s ease-out 0.4s both;
    }

    h1 {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(2.4rem, 9vw, 4.6rem);
      font-weight: 400;
      letter-spacing: 0.07em;
      line-height: 1.22;
      color: var(--accent);
    }

    h1 span {
      display: inline-block;
      animation: wave 2.5s ease-in-out infinite;
    }

    h1 span:nth-child(n) {
      animation-delay: calc(0.08s * var(--i, 0));
    }

    .lead {
      margin: 1.2rem auto 0;
      max-width: 22rem;
      font-size: clamp(0.98rem, 2.3vw, 1.08rem);
      font-weight: 500;
      letter-spacing: 0.03em;
      line-height: 1.75;
      color: var(--muted);
      animation: fade 1s ease-out 0.3s both;
    }

    .study-rule {
      width: min(100%, 14rem);
      height: 1px;
      margin: 1.85rem auto 0;
      background: linear-gradient(
        90deg,
        transparent,
        var(--line) 18%,
        var(--line) 82%,
        transparent
      );
      animation: fade 1s ease-out 0.45s both;
    }

    .actions {
      margin-top: 1.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.95rem;
      animation: fade 1s ease-out 0.55s both;
    }

    .actions a {
      position: relative;
      display: inline-block;
      font-size: 1.02rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--accent);
      text-decoration: none;
      padding-bottom: 0.2rem;
    }

    .actions a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 1px;
      background: currentColor;
      transform: scaleX(0.35);
      transform-origin: left center;
      opacity: 0.55;
      transition: transform 0.28s ease, opacity 0.28s ease;
    }

    .actions a:hover::after {
      transform: scaleX(1);
      opacity: 1;
    }

    .actions a.primary {
      color: var(--light);
      background: var(--accent);
      padding: 0.72rem 1.4rem;
      min-width: 12.5rem;
    }

    .actions a.primary::after {
      display: none;
    }

    .actions a.primary:hover {
      background: #1b4d39;
    }

    .actions a.secondary {
      margin-top: 0.35rem;
      color: var(--accent);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(1.25rem); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes wave {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-0.1em); }
    }

    @keyframes draw {
      from { transform: scaleX(0); opacity: 0; }
      to { transform: scaleX(1); opacity: 1; }
    }

    @keyframes soft-pan {
      from { transform: scale(1.02) translate(0, 0); }
      to { transform: scale(1.06) translate(-1.2%, 0.8%); }
    }

    @media (prefers-reduced-motion: reduce) {
      .backdrop-photo,
      h1 span,
      .course-label::after {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="backdrop" aria-hidden="true">
    <div class="backdrop-photo"></div>
    <div class="backdrop-wash"></div>
    <div class="backdrop-edge"></div>
  </div>

  <main>
    <p class="course-label">課堂學習分享</p>
    <h1 aria-label="AI緣來分享">
      <span style="--i:0">A</span><span style="--i:1">I</span><span style="--i:2">緣</span><span style="--i:3">來</span><span style="--i:4">分</span><span style="--i:5">享</span>
    </h1>
    <p class="lead">１１５０７１１完成使用 Cursor 製作的第一個網頁</p>
    <div class="study-rule" aria-hidden="true"></div>
    <div class="actions">
      <a class="primary" href="https://www.youtube.com/watch?v=3RAsnOmrW-c" target="_blank" rel="noopener noreferrer">學習參考影片連結</a>
      <a class="secondary" href="directory/">其他學習日誌</a>
    </div>
  </main>
</body>
</html>
