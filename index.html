<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI緣來分享</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://images.unsplash.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #163028;
      --muted: #4a6358;
      --accent: #1e6b4f;
      --accent-deep: #134836;
      --foam: #f6faf7;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      color: var(--ink);
      background: #dce9e1;
      overflow-x: hidden;
    }

    .stage {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1.25rem;
    }

    .bg {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .bg-photo {
      position: absolute;
      inset: -3%;
      background:
        url("https://images.unsplash.com/photo-1481627834876-b7833e1d8430?auto=format&fit=crop&w=1920&q=80")
        center / cover no-repeat;
      opacity: 0.34;
      filter: saturate(0.85) brightness(1.08);
      animation: drift 26s ease-in-out infinite alternate;
    }

    .bg-tint {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          160deg,
          rgba(246, 250, 247, 0.88) 0%,
          rgba(230, 241, 234, 0.78) 45%,
          rgba(210, 228, 218, 0.82) 100%
        ),
        radial-gradient(
          ellipse 55% 45% at 50% 35%,
          rgba(255, 255, 255, 0.35),
          transparent 70%
        );
    }

    .panel {
      position: relative;
      z-index: 1;
      width: min(100%, 36rem);
      padding: clamp(2rem, 5vw, 3.2rem) clamp(1.4rem, 4vw, 2.6rem);
      text-align: center;
      animation: rise 1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .eyebrow {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent);
      animation: fade 0.9s ease 0.15s both;
    }

    .divider {
      width: 3rem;
      height: 1px;
      margin: 1rem auto 1.35rem;
      background: var(--accent);
      animation: grow 0.9s ease 0.3s both;
      transform-origin: center;
    }

    h1 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(2.8rem, 11vw, 5.2rem);
      font-weight: 600;
      letter-spacing: 0.1em;
      line-height: 1.15;
      color: var(--accent-deep);
    }

    h1 span {
      display: inline-block;
      animation: floaty 2.8s ease-in-out infinite;
    }

    h1 span:nth-child(n) {
      animation-delay: calc(0.08s * var(--i, 0));
    }

    .lead {
      margin: 1.2rem auto 0;
      max-width: 24rem;
      font-size: clamp(0.98rem, 2.2vw, 1.08rem);
      font-weight: 500;
      line-height: 1.75;
      letter-spacing: 0.02em;
      color: var(--muted);
      animation: fade 1s ease 0.35s both;
    }

    .cta {
      margin-top: 2.1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.9rem;
      animation: fade 1s ease 0.5s both;
    }

    .cta a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: min(100%, 15.5rem);
      padding: 0.85rem 1.4rem;
      font-size: 0.98rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-decoration: none;
      transition: transform 0.22s ease, background 0.22s ease, color 0.22s ease, border-color 0.22s ease;
    }

    .cta .btn-main {
      color: var(--foam);
      background: var(--accent);
      border: 1px solid var(--accent);
    }

    .cta .btn-main:hover {
      transform: translateY(-2px);
      background: var(--accent-deep);
      border-color: var(--accent-deep);
    }

    .cta .btn-ghost {
      color: var(--accent-deep);
      background: transparent;
      border: 1px solid rgba(30, 107, 79, 0.4);
    }

    .cta .btn-ghost:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.45);
      border-color: var(--accent);
    }

    .credit {
      margin-top: 1.8rem;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      color: color-mix(in srgb, var(--muted) 75%, transparent);
      animation: fade 1s ease 0.65s both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(1.4rem); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes grow {
      from { transform: scaleX(0); opacity: 0; }
      to { transform: scaleX(1); opacity: 1; }
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-0.08em); }
    }

    @keyframes drift {
      from { transform: scale(1.04) translate(0, 0); }
      to { transform: scale(1.1) translate(-1.5%, 1%); }
    }

    @media (max-width: 480px) {
      .cta a { min-width: 100%; }
    }

    @media (prefers-reduced-motion: reduce) {
      .bg-photo,
      h1 span,
      .divider { animation: none; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="bg" aria-hidden="true">
      <div class="bg-photo"></div>
      <div class="bg-tint"></div>
    </div>

    <main class="panel">
      <p class="eyebrow">Learning Share</p>
      <div class="divider" aria-hidden="true"></div>
      <h1 aria-label="AI緣來分享">
        <span style="--i:0">A</span><span style="--i:1">I</span><span style="--i:2">緣</span><span style="--i:3">來</span><span style="--i:4">分</span><span style="--i:5">享</span>
      </h1>
      <p class="lead">１１５０７１１完成使用 Cursor 製作的第一個網頁</p>
      <div class="cta">
        <a class="btn-main" href="https://www.youtube.com/watch?v=3RAsnOmrW-c" target="_blank" rel="noopener noreferrer">學習參考影片連結</a>
        <a class="btn-ghost" href="directory/">其他學習日誌</a>
      </div>
      <p class="credit">AI 輔助美編 × 課堂學習分享</p>
    </main>
  </div>
</body>
</html>
