<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI緣來分享</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1a241e;
      --muted: #4d5f54;
      --paper: #e7f0e8;
      --accent: #1f6b4a;
      --accent-soft: #7cbc98;
      --highlight: #cfe8d6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "DM Sans", sans-serif;
      color: var(--ink);
      background-color: var(--paper);
      background-image:
        radial-gradient(ellipse 90% 70% at 12% 8%, rgba(127, 188, 152, 0.42), transparent 58%),
        radial-gradient(ellipse 80% 60% at 92% 88%, rgba(31, 107, 74, 0.16), transparent 52%),
        linear-gradient(165deg, #f5faf6 0%, var(--paper) 48%, #d5e6da 100%),
        repeating-linear-gradient(
          -18deg,
          transparent,
          transparent 28px,
          rgba(31, 107, 74, 0.03) 28px,
          rgba(31, 107, 74, 0.03) 29px
        );
      overflow-x: hidden;
    }

    .leaf {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      opacity: 0.18;
      animation: float 14s ease-in-out infinite alternate;
    }

    .leaf-a {
      top: 8%;
      left: 6%;
      width: 9rem;
      height: 9rem;
      border-radius: 70% 30% 65% 35%;
      background: radial-gradient(circle at 35% 35%, var(--accent-soft), transparent 68%);
    }

    .leaf-b {
      right: 7%;
      bottom: 10%;
      width: 12rem;
      height: 12rem;
      border-radius: 40% 60% 35% 65%;
      background: radial-gradient(circle at 60% 40%, rgba(31, 107, 74, 0.55), transparent 70%);
      animation-delay: -5s;
      opacity: 0.14;
    }

    .frame {
      position: relative;
      z-index: 1;
      width: min(92vw, 38rem);
      padding: clamp(2rem, 5vw, 3.25rem) clamp(1.4rem, 4vw, 2.5rem);
      text-align: center;
      animation: rise 0.95s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .brand-mark {
      display: inline-block;
      margin-bottom: 1.35rem;
      padding-bottom: 0.35rem;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent);
      border-bottom: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
      animation: fade 1s ease-out 0.2s both;
    }

    h1 {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(2.6rem, 10vw, 5rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      line-height: 1.2;
      color: var(--accent);
    }

    h1 span {
      display: inline-block;
      animation: wave 2.6s ease-in-out infinite;
    }

    h1 span:nth-child(n) {
      animation-delay: calc(0.09s * var(--i, 0));
    }

    .lead {
      margin: 1.35rem auto 0;
      max-width: 26rem;
      font-size: clamp(0.98rem, 2.4vw, 1.1rem);
      font-weight: 500;
      letter-spacing: 0.03em;
      line-height: 1.7;
      color: var(--muted);
      animation: fade 1.1s ease-out 0.35s both;
    }

    .actions {
      margin-top: 2.4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      animation: fade 1.1s ease-out 0.55s both;
    }

    .actions a {
      display: inline-block;
      min-width: min(100%, 16rem);
      padding: 0.85rem 1.35rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-decoration: none;
      transition: transform 0.22s ease, background 0.22s ease, color 0.22s ease, border-color 0.22s ease;
    }

    .actions a.primary {
      color: #f4faf6;
      background: var(--accent);
      border: 1px solid var(--accent);
    }

    .actions a.primary:hover {
      transform: translateY(-2px);
      background: #18553b;
      border-color: #18553b;
    }

    .actions a.secondary {
      color: var(--accent);
      background: transparent;
      border: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
    }

    .actions a.secondary:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.45);
      border-color: var(--accent);
    }

    .footnote {
      margin-top: 2.5rem;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      color: color-mix(in srgb, var(--muted) 75%, transparent);
      animation: fade 1.1s ease-out 0.75s both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(1.6rem); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes wave {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-0.1em); }
    }

    @keyframes float {
      from { transform: translate(0, 0) rotate(0deg); }
      to { transform: translate(3%, 5%) rotate(4deg); }
    }

    @media (max-width: 480px) {
      .actions a {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="leaf leaf-a" aria-hidden="true"></div>
  <div class="leaf leaf-b" aria-hidden="true"></div>
  <main class="frame">
    <p class="brand-mark">Share &amp; Learn</p>
    <h1 aria-label="AI緣來分享">
      <span style="--i:0">A</span><span style="--i:1">I</span><span style="--i:2">緣</span><span style="--i:3">來</span><span style="--i:4">分</span><span style="--i:5">享</span>
    </h1>
    <p class="lead">１１５０７１１完成使用 Cursor 製作的第一個網頁</p>
    <div class="actions">
      <a class="primary" href="https://www.youtube.com/watch?v=3RAsnOmrW-c" target="_blank" rel="noopener noreferrer">學習參考影片連結</a>
      <a class="secondary" href="directory/">其他學習日誌</a>
    </div>
    <p class="footnote">AI × 學習分享</p>
  </main>
</body>
</html>
