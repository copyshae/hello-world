<head>
  <meta charset="UTF-8" />

  <title>202607｜學習日誌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1a1f1c;
      --paper: #e8efe6;
      --accent: #2d6a4f;
      --muted: #4a5c52;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "DM Sans", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(149, 213, 178, 0.45), transparent 55%),
        radial-gradient(ellipse 70% 50% at 90% 80%, rgba(45, 106, 79, 0.18), transparent 50%),
        linear-gradient(160deg, #f4faf6 0%, var(--paper) 45%, #d8e8dc 100%);
    }

    .wrap {
      max-width: 40rem;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
      animation: rise 0.8s ease-out both;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .nav a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
    }

    .nav a:hover {
      text-decoration: underline;
      text-underline-offset: 0.2em;
    }

    h1 {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 400;
      color: var(--accent);
      letter-spacing: 0.04em;
      line-height: 1.3;
    }

    .lead {
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .dir-list {
      list-style: none;
      margin-top: 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .dir-list a {
      display: block;
      padding: 1.15rem 1.35rem;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(45, 106, 79, 0.22);
      color: var(--ink);
      text-decoration: none;
      font-weight: 600;
      font-size: 1.15rem;
      letter-spacing: 0.03em;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }

    .dir-list a:hover {
      background: rgba(255, 255, 255, 0.9);
      border-color: var(--accent);
      transform: translateX(4px);
    }

    .dir-list a span {
      display: block;
      margin-top: 0.35rem;
      font-weight: 400;
      font-size: 0.9rem;
      color: var(--muted);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(1rem); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
