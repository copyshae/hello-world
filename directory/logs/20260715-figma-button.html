<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>20260715 產出｜加按鈕</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1c1917;
      --muted: #78716c;
      --paper: #f5f0eb;
      --line: rgba(28, 25, 23, 0.14);
      --accent: #0f766e;
      --accent-strong: #115e59;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: "Outfit", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse 70% 50% at 80% 0%, rgba(15, 118, 110, 0.14), transparent 55%),
        linear-gradient(165deg, #faf7f4 0%, var(--paper) 55%, #e7e0d8 100%);
    }
    .wrap { max-width: 48rem; margin: 0 auto; padding: 1.5rem 1.25rem 3.5rem; }
    .nav { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; font-size: 0.95rem; }
    .nav a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .nav a:hover { text-decoration: underline; text-underline-offset: 0.2em; }
    h1 {
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(1.6rem, 4.5vw, 2.2rem);
      font-weight: 600;
      color: var(--accent-strong);
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }
    .lead { color: var(--muted); margin-bottom: 1.5rem; line-height: 1.65; }
    .frame {
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--line);
      padding: 1.5rem 1.25rem 1.75rem;
      animation: rise 0.7s ease-out both;
    }
    .frame h2 {
      font-family: "Fraunces", Georgia, serif;
      font-size: 1.15rem;
      font-weight: 500;
      margin-bottom: 1rem;
      color: var(--ink);
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.85rem;
      align-items: center;
      margin-bottom: 1.25rem;
    }
    .label {
      width: 100%;
      font-size: 0.82rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      margin-bottom: 0.15rem;
    }
    .btn {
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      padding: 0.7rem 1.35rem;
      transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-strong); box-shadow: 0 8px 20px rgba(15,118,110,0.28); }
    .btn-ghost {
      background: transparent;
      color: var(--accent-strong);
      border: 1.5px solid rgba(15, 118, 110, 0.45);
    }
    .btn-ghost:hover { background: rgba(15, 118, 110, 0.08); }
    .btn-soft {
      background: #ccfbf1;
      color: var(--accent-strong);
    }
    .btn-soft:hover { background: #99f6e4; }
    .btn-pill {
      border-radius: 999px;
      background: var(--ink);
      color: #faf7f4;
    }
    .btn-pill:hover { background: #44403c; }
    .canvas {
      margin-top: 0.5rem;
      min-height: 12rem;
      display: grid;
      place-items: center;
      background:
        linear-gradient(135deg, rgba(15,118,110,0.08), transparent 40%),
        #fff;
      border: 1px dashed rgba(15, 118, 110, 0.35);
      padding: 2rem 1rem;
      animation: fade 0.9s ease-out 0.2s both;
    }
    .canvas .btn-primary { animation: pop 0.55s cubic-bezier(0.34, 1.45, 0.64, 1) 0.45s both; }
    .note { margin-top: 1.25rem; font-size: 0.92rem; color: var(--muted); line-height: 1.6; }
    .note a { color: var(--accent); }
    @keyframes rise {
      from { opacity: 0; transform: translateY(0.8rem); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes pop {
      from { opacity: 0; transform: scale(0.86); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="nav">
      <a href="20260715-env-check.html">← 成果子頁</a>
      <a href="20260715-hands-on-execute.html">← 20260715 日誌</a>
      <a href="20260715-ecommerce-home.html">電商首頁產出 →</a>
    </nav>
    <h1>產出｜加按鈕</h1>
    <p class="lead">對應 TalkToFigma 口令示範：「加一個按鈕」。以下為網頁還原的按鈕元件組（主按鈕／幽靈／柔彩／膠囊）。</p>
    <div class="frame">
      <h2>Button / 元件庫</h2>
      <div class="row">
        <span class="label">PRIMARY</span>
        <button type="button" class="btn btn-primary">立即加入</button>
        <button type="button" class="btn btn-primary">開始設計</button>
      </div>
      <div class="row">
        <span class="label">SECONDARY</span>
        <button type="button" class="btn btn-ghost">稍後再說</button>
        <button type="button" class="btn btn-soft">收藏清單</button>
        <button type="button" class="btn btn-pill">追蹤更新</button>
      </div>
      <div class="canvas">
        <button type="button" class="btn btn-primary">新規格按鈕</button>
      </div>
      <p class="note">實作語境：Cursor → TalkToFigma → Figma Frame。本頁為可預覽的 HTML 對照成果。<a href="20260715-ecommerce-home.html">下一產出：整頁電商首頁 →</a></p>
    </div>
  </div>
</body>
</html>
